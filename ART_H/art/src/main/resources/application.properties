spring.application.name=art

# PostgreSQL (建议用环境变量注入，避免明文提交密码)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/art}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway：自动执行 db/migration 下的建表脚本
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# 核心指令：让 JPA 根据你的 Java 实体类，自动去数据库建表/更新表！
spring.jpa.hibernate.ddl-auto=update

# 开启 SQL 打印，亲眼看着它建表，极度解压
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ==========================================
# 文件上传配置 (核心！)
# ==========================================
# 相对路径：./paper 代表在项目根目录下自动创建一个 paper 文件夹
file.upload-dir=./paper

# Spring Boot 默认只能传 1MB 的文件，稍微大点的 PDF 就会报错，必须放大限制！
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB