services:
  # ============================================
  # PostgreSQL 数据库（备用，如需使用请取消注释）
  # ============================================
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: art-postgres
  #   environment:
  #     POSTGRES_DB: art
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - art-network

  # ============================================
  # ART_P - Python AI 微服务
  # ============================================
  art-p:
    build:
      context: .
      dockerfile: ART_P/Dockerfile
    container_name: art-p
    ports:
      - "${ART_P_PORT:-8000}:8000"
    volumes:
      - ./ART_P:/app
      - ./ART_H/art/paper:/app/paper
    environment:
      # AI 服务
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-your-api-key-here}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://yunai.chat/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      # Embedding
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-sk-euTRGO3zwvrKExz6Y7tShOtBg5Hc27lVkZyAcxCZdoY1PVZc}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://yunai.chat/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # 网络代理
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-*}
      # 超时与重试
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-120}
      CONNECT_TIMEOUT: ${CONNECT_TIMEOUT:-30}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY: ${RETRY_DELAY:-1.0}
      # 应用
      APP_PORT: ${APP_PORT:-8000}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      DEBUG_MODE: ${DEBUG_MODE:-false}
      # PDF
      PDF_MAX_PAGES: ${PDF_MAX_PAGES:-5}
      PDF_FILTER_HEADER_FOOTER: ${PDF_FILTER_HEADER_FOOTER:-true}
      # AI 参数
      PARSE_TEMPERATURE: ${PARSE_TEMPERATURE:-0.3}
      PARSE_MAX_TOKENS: ${PARSE_MAX_TOKENS:-1000}
      REVIEW_TEMPERATURE: ${REVIEW_TEMPERATURE:-0.7}
      REVIEW_MAX_TOKENS: ${REVIEW_MAX_TOKENS:-4000}
      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      COLORED_LOG: ${COLORED_LOG:-true}
    mem_limit: 512m
    networks:
      - art-network
    restart: unless-stopped

  # ============================================
  # ART_H - Java Spring Boot 后端
  # ============================================
  art-h:
    build:
      context: .
      dockerfile: ART_H/Dockerfile
    container_name: art-h
    ports:
      - "${ART_H_PORT:-8080}:8080"
    volumes:
      - ./ART_H/art/paper:/app/paper
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:?请在 .env 中配置 DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:?请在 .env 中配置 DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?请在 .env 中配置 DB_PASSWORD}
      AI_PYTHON_API_URL: http://art-p:8000/api/ai/parse
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    mem_limit: 512m
    networks:
      - art-network
    depends_on:
      - art-p
    restart: unless-stopped

  # ============================================
  # ART_Q - Vue 前端（Nginx 生产模式）
  # ============================================
  art-q:
    build:
      context: .
      dockerfile: ART_Q/Dockerfile
    container_name: art-q
    ports:
      - "${ART_Q_PORT:-5173}:80"
    environment:
      # nginx 代理 API 请求，前端不需要写死服务器地址
      VITE_APP_API_URL: ""
      VITE_APP_PDF_URL: ""
    mem_limit: 128m
    networks:
      - art-network
    depends_on:
      - art-h
    restart: unless-stopped

networks:
  art-network:
    driver: bridge

volumes:
  postgres_data:
